<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Example Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:40px;
}

.container{
    display:grid;
    grid-template-columns: 1fr 2fr;
    gap:20px;
    max-width:900px;
    margin:auto;
}

.example{
    font-size:18px;
    padding-top:10px;
}

textarea{
    width:100%;
    height:120px;
    font-size:16px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    resize:vertical;
}

.row{
    display:contents;
}
</style>
</head>

<body>

<h1>Text Art Practice</h1>

<h2>Practice each example in the text boxes below</h2>

<h3>FACES</h3>

<div class="container">

<div class="row">
<div class="example">:-)</div>
<textarea></textarea>
</div>

<div class="row">
<div class="example">8>D</div>
<textarea></textarea>
</div>

<div class="row">
<div class="example">;3*</div>
<textarea></textarea>
</div>

<div class="row">
<div class="example">B=}</div>
<textarea></textarea>
</div>

<div class="row">
<div class="example">Now make some of your own!</div>
<textarea></textarea>
</div>

<h2>Now we're going to try something a little more complicated!</h2>
    
<h3>ANIMALS</h3>

<div class="row">
<div class="example">:-)</div>
<textarea></textarea>
</div>

<div class="row">
<div class="example">8>D</div>
<textarea></textarea>
</div>

<div class="row">
<div class="example">;3*</div>
<textarea></textarea>
</div>

<div class="row">
<div class="example">B=}</div>
<textarea></textarea>
</div>

<div class="row">
<div class="example">Now make some of your own!</div>
<textarea></textarea>
</div>
    
</div>

</body>
</html>
