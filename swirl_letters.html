<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Swirling Word Waterfall</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let W = canvas.width
let H = canvas.height

const words = [
"SPOON","FACTORY","💖","🥄","🏭","💛","🧡","🩵","💚","✨","❤️","💕","💜"
]

const particles = []

let mouse = {x:W/2,y:H/2}

window.addEventListener("resize",()=>{
canvas.width = window.innerWidth
canvas.height = window.innerHeight
W = canvas.width
H = canvas.height
})

window.addEventListener("mousemove",e=>{
mouse.x = e.clientX
mouse.y = e.clientY
})

window.addEventListener("touchmove",e=>{
mouse.x = e.touches[0].clientX
mouse.y = e.touches[0].clientY
})

class Word{

constructor(){
this.reset()
}

reset(){

this.x = Math.random()*W
this.y = Math.random()*-H

this.size = 20 + Math.random()*20
this.speed = 0.8 + Math.random()*1.8

this.angle = Math.random()*Math.PI*2
this.spin = (Math.random()-0.5)*0.08

this.word = words[Math.floor(Math.random()*words.length)]

}

update(){

this.angle += this.spin

let swirlX = Math.cos(this.angle)*2
let swirlY = Math.sin(this.angle)*2

let dx = mouse.x - this.x
let dy = mouse.y - this.y
let dist = Math.sqrt(dx*dx + dy*dy)

let pull = 0

if(dist < 220){
pull = (220 - dist)/220
}

this.x += swirlX + dx * pull * 0.02
this.y += this.speed + swirlY + dy * pull * 0.02

if(this.y > H + 40){
this.reset()
this.y = -20
}

}

draw(){

ctx.font = this.size + "px monospace"
ctx.fillStyle = "white"
ctx.fillText(this.word,this.x,this.y)

}

}

for(let i=0;i<90;i++){
particles.push(new Word())
}

function animate(){

ctx.fillStyle = "rgba(0,0,0,0.25)"
ctx.fillRect(0,0,W,H)

for(let p of particles){
p.update()
p.draw()
}

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
